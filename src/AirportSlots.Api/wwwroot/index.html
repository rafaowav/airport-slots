<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>airport-slots-sqlserver-dashboard</title><style>body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0;padding:20px;color:#222}.wrap{max-width:1200px;margin:0 auto}.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}.card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:16px}.item{border:1px solid #ddd;border-radius:10px;padding:12px;margin-bottom:10px;cursor:pointer}.actions button{margin:4px;padding:10px 14px;border:0;border-radius:999px;background:#006d77;color:#fff;cursor:pointer}input,select{width:100%;padding:10px;margin:8px 0}.muted{color:#666}pre{white-space:pre-wrap;font-size:12px}@media(max-width:900px){.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><h1>Dashboard de Gestão de Slots com SQL Server</h1><div class="grid"><div class="card"><h2>Voos</h2><div id="flights"></div></div><div class="card"><h2>Operações</h2><div id="selected" class="muted">Selecione um voo.</div><label>Início</label><input id="start" type="datetime-local"><label>Fim</label><input id="end" type="datetime-local"><label>Gate</label><input id="gate" placeholder="Ex.: A-01"><div class="actions"><button onclick="confirmSlot()">Confirmar slot</button><button onclick="assignGate()">Atribuir gate</button><button onclick="cancelFlight()">Cancelar voo</button></div></div><div class="card"><h2>Eventos</h2><div id="events"></div></div></div></div><script>let flights=[],selectedId=null;async function api(url,opt={}){const r=await fetch(url,{headers:{'Content-Type':'application/json'},...opt});return r.json()}async function load(){flights=await api('/api/flights');const events=await api('/api/processes/events');renderFlights();document.getElementById('events').innerHTML=events.map(e=>`<div class="item"><strong>${e.eventType}</strong><pre>${e.eventData}</pre></div>`).join('')}function renderFlights(){document.getElementById('flights').innerHTML=flights.map(f=>`<div class="item" onclick="selectFlight('${f.id}')"><strong>${f.flightNumber}</strong><div class="muted">${f.statusName} | Gate: ${f.gateCode||'-'}</div></div>`).join('')}function selectFlight(id){selectedId=id;const f=flights.find(x=>x.id===id);document.getElementById('selected').innerHTML=`<strong>${f.flightNumber}</strong><br>Status: ${f.statusName}<br>Gate: ${f.gateCode||'-'}`}async function confirmSlot(){if(!selectedId)return;await api(`/api/flights/${selectedId}/confirm-slot`,{method:'POST',body:JSON.stringify({start:new Date(document.getElementById('start').value).toISOString(),end:new Date(document.getElementById('end').value).toISOString()})});load()}async function assignGate(){if(!selectedId)return;await api(`/api/flights/${selectedId}/assign-gate`,{method:'POST',body:JSON.stringify({gateCode:document.getElementById('gate').value})});load()}async function cancelFlight(){if(!selectedId)return;await api(`/api/flights/${selectedId}/cancel`,{method:'POST'});load()}const now=new Date();document.getElementById('start').value=new Date(now.getTime()-now.getTimezoneOffset()*60000+3600000).toISOString().slice(0,16);document.getElementById('end').value=new Date(now.getTime()-now.getTimezoneOffset()*60000+7200000).toISOString().slice(0,16);load();</script></body></html>
